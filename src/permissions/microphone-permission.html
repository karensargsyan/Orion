<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microphone Permission</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1c25;
      --text: #e4e6ef;
      --muted: #9aa0b4;
      --accent: #6c5ce7;
      --accent-hover: #7f70f0;
      --success: #2ecc71;
      --error: #e74c3c;
      --border: #2e3140;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
    }
    .status {
      margin: 16px 0;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      white-space: pre-wrap;
    }
    .status.success {
      border-color: rgba(46, 204, 113, 0.4);
      color: var(--success);
    }
    .status.error {
      border-color: rgba(231, 76, 60, 0.4);
      color: var(--error);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: white;
      font: inherit;
      cursor: pointer;
    }
    button:hover {
      background: var(--accent-hover);
    }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Enable Microphone Access</h1>
    <p>This window requests microphone access for the extension. Once you allow it, supervised learning can capture voice commands from the side panel.</p>
    <div id="status" class="status">Waiting to request microphone access...</div>
    <div class="actions">
      <button id="btn-request">Request Microphone</button>
      <button id="btn-close" class="secondary">Close</button>
    </div>
  </main>
  <script type="module" src="microphone-permission.js"></script>
</body>
</html>
