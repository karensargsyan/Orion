<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="64" cy="64" r="53.504000000000005" fill="url(#glow)"/>

  <!-- Main ring -->
  <circle cx="64" cy="64" r="48.64" fill="none" stroke="url(#ring)" stroke-width="7.04"/>

  <!-- Orion's belt — three dots -->
  <circle cx="46.976" cy="59.135999999999996" r="5.12" fill="#a29bfe"/>
  <circle cx="64" cy="56.57599999999999" r="5.12" fill="#a29bfe"/>
  <circle cx="81.024" cy="59.135999999999996" r="5.12" fill="#a29bfe"/>

  <!-- Connecting lines (subtle) -->
  <line x1="46.976" y1="59.135999999999996" x2="64" y2="56.57599999999999" stroke="#a29bfe" stroke-opacity="0.4" stroke-width="2.56"/>
  <line x1="64" y1="56.57599999999999" x2="81.024" y2="59.135999999999996" stroke="#a29bfe" stroke-opacity="0.4" stroke-width="2.56"/>

  <!-- Center star -->
  <polygon points="64,61.056 67.25834804770761,68.03765195229238 74.24,71.29599999999999 67.25834804770761,74.5543480477076 64,81.536 60.741651952292386,74.5543480477076 53.76,71.29599999999999 60.741651952292386,68.03765195229238" fill="#ffffff" opacity="0.9"/>

  <!-- Top accent star (small) -->
  <circle cx="64" cy="32.384" r="3.5839999999999996" fill="#ffffff" opacity="0.7"/>

  <!-- Bottom accent dots -->
  <circle cx="49.408" cy="93.184" r="3.072" fill="#a29bfe" opacity="0.5"/>
  <circle cx="78.592" cy="93.184" r="3.072" fill="#a29bfe" opacity="0.5"/>
</svg>