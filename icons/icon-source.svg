  <line x1="256" y1="226.30399999999997" x2="324.096" y2="236.54399999999998" stroke="#a29bfe" stroke-opacity="0.4" stroke-width="10.24"/>

  <!-- Center star -->
  <polygon points="256,244.224 269.03339219083045,272.1506078091695 296.96,285.18399999999997 269.03339219083045,298.2173921908304 256,326.144 242.96660780916955,298.2173921908304 215.04,285.18399999999997 242.96660780916955,272.1506078091695" fill="#ffffff" opacity="0.9"/>

