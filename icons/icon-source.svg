<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a1f5e"/>
      <stop offset="60%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#110b28"/>
    </radialGradient>

    <!-- Ring gradient -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8b0ff"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#b8b0ff"/>
    </linearGradient>

    <!-- Glow for center star -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#a29bfe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>

    <!-- Belt dot glow -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#a29bfe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240.64" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="214.01600000000002" fill="url(#ambientGlow)"/>

  <!-- Accent ring -->
  <circle cx="256" cy="256" r="194.56" fill="none" stroke="url(#ring)" stroke-width="9.216" stroke-opacity="0.7"/>

  <!-- Constellation lines (subtle) -->
  <!-- Shoulders to belt -->
  <line x1="184.32" y1="153.6" x2="185.344" y2="253.44" stroke="#a29bfe" stroke-opacity="0.25" stroke-width="3.072"/>
  <line x1="327.68" y1="168.96" x2="326.656" y2="253.44" stroke="#a29bfe" stroke-opacity="0.25" stroke-width="3.072"/>
  <!-- Belt connections -->
  <line x1="185.344" y1="253.44" x2="256" y2="240.64" stroke="#a29bfe" stroke-opacity="0.3" stroke-width="3.584"/>
  <line x1="256" y1="240.64" x2="326.656" y2="253.44" stroke="#a29bfe" stroke-opacity="0.3" stroke-width="3.584"/>
  <!-- Belt to feet -->
  <line x1="185.344" y1="253.44" x2="184.32" y2="363.52" stroke="#a29bfe" stroke-opacity="0.2" stroke-width="2.56"/>
  <line x1="326.656" y1="253.44" x2="332.8" y2="355.84" stroke="#a29bfe" stroke-opacity="0.2" stroke-width="2.56"/>

  <!-- Center star glow -->
  <circle cx="256" cy="302.08" r="40.96" fill="url(#starGlow)"/>

  <!-- Center star (4-pointed) -->
  <polygon points="256,279.03999999999996 261.4305800795127,296.6494199204873 279.04,302.08 261.4305800795127,307.5105800795127 256,325.12 250.56941992048732,307.5105800795127 232.96,302.08 250.56941992048732,296.6494199204873" fill="#ffffff" opacity="0.95"/>

  <!-- Shoulder stars -->
  <circle cx="184.32" cy="153.6" r="9.574399999999999" fill="#e8c8ff" opacity="0.8"/>
  <circle cx="327.68" cy="168.96" r="8.448" fill="#c8d8ff" opacity="0.75"/>

  <!-- Belt stars (brightest) -->
  
  <circle cx="185.344" cy="253.44" r="20.275199999999998" fill="url(#dotGlow)"/>
  <circle cx="185.344" cy="253.44" r="11.264" fill="#ffffff" opacity="0.95"/>
  
  <circle cx="256" cy="240.64" r="20.275199999999998" fill="url(#dotGlow)"/>
  <circle cx="256" cy="240.64" r="11.264" fill="#ffffff" opacity="0.95"/>
  
  <circle cx="326.656" cy="253.44" r="20.275199999999998" fill="url(#dotGlow)"/>
  <circle cx="326.656" cy="253.44" r="11.264" fill="#ffffff" opacity="0.95"/>
  

  <!-- Foot stars -->
  <circle cx="184.32" cy="363.52" r="7.884799999999999" fill="#a8c8ff" opacity="0.65"/>
  <circle cx="332.8" cy="355.84" r="9.0112" fill="#c8e0ff" opacity="0.7"/>

  <!-- Tiny background stars for depth -->
  <circle cx="384" cy="112.63999999999999" r="2.56" fill="#ffffff" opacity="0.3"/>
  <circle cx="102.4" cy="332.8" r="2.048" fill="#ffffff" opacity="0.25"/>
  <circle cx="332.8" cy="409.6" r="2.048" fill="#ffffff" opacity="0.2"/>
  <circle cx="143.36" cy="92.16" r="1.536" fill="#ffffff" opacity="0.2"/>
  <circle cx="424.96000000000004" cy="296.96" r="1.536" fill="#ffffff" opacity="0.15"/>
</svg>