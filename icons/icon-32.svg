<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="16" cy="16" r="13.376000000000001" fill="url(#glow)"/>

  <!-- Main ring -->
  <circle cx="16" cy="16" r="12.16" fill="none" stroke="url(#ring)" stroke-width="1.76"/>

  <!-- Orion's belt — three dots -->
  <circle cx="11.744" cy="14.783999999999999" r="1.28" fill="#a29bfe"/>
  <circle cx="16" cy="14.143999999999998" r="1.28" fill="#a29bfe"/>
  <circle cx="20.256" cy="14.783999999999999" r="1.28" fill="#a29bfe"/>

  <!-- Connecting lines (subtle) -->
  <line x1="11.744" y1="14.783999999999999" x2="16" y2="14.143999999999998" stroke="#a29bfe" stroke-opacity="0.4" stroke-width="0.64"/>
  <line x1="16" y1="14.143999999999998" x2="20.256" y2="14.783999999999999" stroke="#a29bfe" stroke-opacity="0.4" stroke-width="0.64"/>

  <!-- Center star -->
  <polygon points="16,15.264 16.814587011926903,17.009412988073095 18.56,17.823999999999998 16.814587011926903,18.6385870119269 16,20.384 15.185412988073097,18.6385870119269 13.44,17.823999999999998 15.185412988073097,17.009412988073095" fill="#ffffff" opacity="0.9"/>

  <!-- Top accent star (small) -->
  <circle cx="16" cy="8.096" r="0.8959999999999999" fill="#ffffff" opacity="0.7"/>

  <!-- Bottom accent dots -->
  <circle cx="12.352" cy="23.296" r="0.768" fill="#a29bfe" opacity="0.5"/>
  <circle cx="19.648" cy="23.296" r="0.768" fill="#a29bfe" opacity="0.5"/>
</svg>