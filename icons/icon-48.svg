<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="24" cy="24" r="20.064000000000004" fill="url(#glow)"/>

  <!-- Main ring -->
  <circle cx="24" cy="24" r="18.240000000000002" fill="none" stroke="url(#ring)" stroke-width="2.64"/>

  <!-- Orion's belt — three dots -->
  <circle cx="17.616" cy="22.176" r="1.92" fill="#a29bfe"/>
  <circle cx="24" cy="21.215999999999998" r="1.92" fill="#a29bfe"/>
  <circle cx="30.384" cy="22.176" r="1.92" fill="#a29bfe"/>

  <!-- Connecting lines (subtle) -->
  <line x1="17.616" y1="22.176" x2="24" y2="21.215999999999998" stroke="#a29bfe" stroke-opacity="0.4" stroke-width="0.96"/>
  <line x1="24" y1="21.215999999999998" x2="30.384" y2="22.176" stroke="#a29bfe" stroke-opacity="0.4" stroke-width="0.96"/>

  <!-- Center star -->
  <polygon points="24,22.896 25.221880517890355,25.514119482109646 27.84,26.736 25.221880517890355,27.957880517890356 24,30.576 22.778119482109645,27.957880517890356 20.16,26.736 22.778119482109645,25.514119482109646" fill="#ffffff" opacity="0.9"/>

  <!-- Top accent star (small) -->
  <circle cx="24" cy="12.143999999999998" r="1.3439999999999999" fill="#ffffff" opacity="0.7"/>

  <!-- Bottom accent dots -->
  <circle cx="18.528" cy="34.944" r="1.152" fill="#a29bfe" opacity="0.5"/>
  <circle cx="29.472" cy="34.944" r="1.152" fill="#a29bfe" opacity="0.5"/>
</svg>